name: sine
arch: "${NFPM_ARCH}"
platform: linux
version: "${SINE_VERSION}"
section: utils
priority: optional
maintainer: CosmoCreeper
description: Community-driven mod and theme manager for Firefox-based browsers.
vendor: Sine
homepage: https://github.com/CosmoCreeper/Sine
license: GPL-3.0-only
contents:
  - src: packaging/root/usr/bin/sine
    dst: /usr/bin/sine
    file_info:
      mode: 0755
  - src: packaging/linux/sine.desktop
    dst: /usr/share/applications/sine.desktop
    file_info:
      mode: 0644
  - src: packaging/linux/sine.svg
    dst: /usr/share/icons/hicolor/scalable/apps/sine.svg
    file_info:
      mode: 0644
  - src: packaging/linux/install-source
    dst: /usr/share/sine/install-source
    file_info:
      mode: 0644
deb:
  fields:
    Bugs: https://github.com/CosmoCreeper/Sine/issues
rpm:
  group: Applications/System
  summary: Sine mod and theme manager
