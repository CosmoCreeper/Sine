name: Test PR

on:
  push:
    branches: ["main", "cosine"]
  pull_request:
    branches: ["main", "cosine"]
  workflow_dispatch:

jobs:
  lint:
    name: "Linter (CI)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun ci

      - name: Lint code
        run: bun lint
