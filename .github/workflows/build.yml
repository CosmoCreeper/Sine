name: Build cross-platform installers

on:
  workflow_dispatch:
    inputs:
      sine_version:
        type: string
        description: "Version of Sine (release tag, without 'v')"
        required: true
      boot_version:
        type: string
        description: "Version of Sine's bootloader (release tag, without 'v')"
        required: true

permissions:
  contents: read
  attestations: write
  id-token: write

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # ================= Windows =================
          - os: windows
            arch: x64
            runner: windows-latest
            generator: "Visual Studio 17 2022"
            vs_arch: x64
            triplet: x64-windows-static

          - os: windows
            arch: arm64
            runner: windows-11-arm
            generator: "Visual Studio 17 2022"
            vs_arch: ARM64
            triplet: arm64-windows-static

          # ================= Linux =================
          - os: linux
            arch: x64
            runner: ubuntu-latest
            generator: Ninja
            triplet: x64-linux

          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            generator: Ninja
            triplet: arm64-linux

          # ================= macOS =================
          - os: macos
            arch: x64
            runner: macos-15-intel
            generator: Ninja
            triplet: x64-osx

          - os: macos
            arch: arm64
            runner: macos-latest
            generator: Ninja
            triplet: arm64-osx

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Clone external repository
        run: |
          git clone --recurse-submodules https://github.com/sineorg/installer.git external

      # ---------- Linux OpenGL / X11 ----------
      - name: Install OpenGL dependencies (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev

      # ---------- Ninja ----------
      - name: Install Ninja (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      # ---------- vcpkg ----------
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11.6
        with:
          vcpkgDirectory: vcpkg
        env:
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}

      # ---------- Configure ----------
      - name: Configure (Windows)
        if: matrix.os == 'windows'
        run: |
          cmake -S external -B build `
            -G "$env:GENERATOR" `
            -A "$env:ARCH" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET="$env:TRIPLET" `
            -DSINE_VERSION="$env:SINE_VERSION" `
            -DBOOT_VERSION="$env:BOOT_VERSION"
        env:
          VCPKG_ROOT: ${{ github.workspace }}\vcpkg
          GENERATOR: ${{ matrix.generator }}
          ARCH: ${{ matrix.vs_arch }}
          TRIPLET: ${{ matrix.triplet }}
          SINE_VERSION: ${{ inputs.sine_version }}
          BOOT_VERSION: ${{ inputs.boot_version }}

      - name: Configure (Linux / macOS)
        if: matrix.os != 'windows'
        run: |
          cmake -S external -B build \
            -G "${GENERATOR}" \
            -DSINE_VERSION=${SINE_VERSION} \
            -DBOOT_VERSION=${BOOT_VERSION}
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
          VCPKG_DEFAULT_TRIPLET: ${{ matrix.triplet }}
          GENERATOR: ${{ matrix.generator }}
          SINE_VERSION: ${{ inputs.sine_version }}
          BOOT_VERSION: ${{ inputs.boot_version }}

      # ---------- Build ----------
      - name: Build
        run: |
          cmake --build build --config Release

      # ---------- Folder configuration ----------
      - name: Ensure artifacts directory
        shell: bash
        run: |
          mkdir -p artifacts/

      # ---------- Artifacts ----------
      - name: Make executable (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          chmod +x build/sine_installer
          if [[ "$OS" == "linux" ]]; then
            cp build/sine_installer artifacts/sine-linux-${ARCH}
          elif [[ "$OS" == "macos" ]]; then
            cp build/sine_installer artifacts/sine-osx-${ARCH}
          fi
        env:
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}

      - name: Prepare executable for upload
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "build/Release/sine-win-$env:ARCH.exe" -Destination "artifacts/sine-win-$env:ARCH.exe"
        env:
          ARCH: ${{ matrix.arch }}

      - name: Attest artifacts
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: artifacts/*

      - name: Upload Linux executable
        if: matrix.os == 'linux'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sine-linux-${{ matrix.arch }}
          path: artifacts/sine-linux-${{ matrix.arch }}

      - name: Upload macOS executable
        if: matrix.os == 'macos'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sine-osx-${{ matrix.arch }}
          path: artifacts/sine-osx-${{ matrix.arch }}

      - name: Upload Windows executable
        if: matrix.os == 'windows'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: sine-win-${{ matrix.arch }}
          path: artifacts/sine-win-${{ matrix.arch }}.exe
